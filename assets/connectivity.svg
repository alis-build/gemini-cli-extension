    fill="none"
    stroke="#3a3a3a"
    stroke-width="1.5"
    opacity="0.24"
  />

  <path d="M310 154 C430 134 550 134 674 154" fill="none" stroke="url(#connection)" stroke-linecap="round" stroke-width="4" opacity="0.82"/>
  <g fill="#52d6a3" opacity="0.95">
    <circle cx="438" cy="140" r="4.5"/>
    <circle cx="512" cy="140" r="4.5"/>
    <circle cx="586" cy="144" r="4.5"/>
